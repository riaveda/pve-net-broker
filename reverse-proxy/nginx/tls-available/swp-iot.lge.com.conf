# swp-iot.lge.com — HTTPS(:443) + HTTP/2 TLS 종단 (사내 CA leaf 인증서).
#
# 활성화: 이 파일을 ../tls-enabled/ 로 복사하면 reverse-proxy.conf 의 glob include 가 잡는다.
#         (인증서를 .42:/etc/nginx/ssl/ 에 먼저 배치해야 nginx -t 통과 — 상세 docs/tls-setup.md.)
# 라우팅 본문은 :80 과 동일한 _service-routes.conf 를 공유(단일 소스) → 라우팅 드리프트 0.
#
# 'listen ... http2' 는 nginx 전 버전 호환. nginx 1.25.1+ 는 'http2 on;' 을 권장하나
# 구문은 deprecation 경고만 낼 뿐 그대로 동작한다(신 버전이면 아래 http2 를 떼고 'http2 on;' 한 줄로 교체 가능).
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    server_name swp-iot.lge.com;

    ssl_certificate     /etc/nginx/ssl/swp-iot.lge.com.crt;
    ssl_certificate_key /etc/nginx/ssl/swp-iot.lge.com.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    # HSTS(Strict-Transport-Security) 는 Phase 2(https 기본화) 확정 후 추가한다 —
    # 지금 넣으면 https 장애 시 브라우저가 http 로 못 내려와 복구 불가.

    include /home/riaveda/reverse-proxy/nginx/_service-routes.conf;
}

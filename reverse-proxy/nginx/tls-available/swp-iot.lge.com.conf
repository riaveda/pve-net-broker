# swp-iot.lge.com — HTTPS(:443) + HTTP/2 TLS 종단, 단일 호스트 인증서.
#
# 【준비만 됨 · 비활성】 이 파일은 tls-available/ 에 있을 뿐 어디에도 include 되지 않아 동작하지 않는다.
# 활성화: ../tls-enabled/ 로 복사하면 reverse-proxy.conf 의 glob include 가 잡는다.
#         (먼저 인증서를 .42:/etc/nginx/ssl/ 에 배치해야 nginx -t 통과 — 상세 docs/tls-setup.md.)
# 라우팅 본문은 :80 과 동일한 _service-routes.conf 를 공유(단일 소스) → 드리프트 0.
#
# TLS 는 경로/포트 무관·호스트명(SNI)만 매칭 → swp-iot.lge.com 인증서 한 장이 이 밑 전 경로
# (/gitlab·/build·/agent…) + 같은 호스트 다른 포트(PVE 관리 swp-iot.lge.com:8006)까지 커버.
#
# 'listen ... http2' 는 nginx 전 버전 호환. 1.25.1+ 는 'http2 on;' 권장(구문 경고만·동작함).
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name swp-iot.lge.com;

    ssl_certificate     /etc/nginx/ssl/swp-iot.lge.com.crt;
    ssl_certificate_key /etc/nginx/ssl/swp-iot.lge.com.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    # HSTS 는 https 기본화(강제 리다이렉트) 확정 후에만 추가 — 지금 넣으면 https 장애 시 복구 불가.

    include /home/riaveda/reverse-proxy/nginx/_service-routes.conf;
}

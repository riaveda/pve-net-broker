# 리버스프록시 공용 라우팅 본문 — :80(현재) + 준비된 :443(tls-available) 이 함께 include.
# 라우팅은 여기 한 곳에서만 정의(단일 소스) — 두 곳에 중복하면 드리프트한다.
# 절대경로 include 라 nginx prefix 무관(아래 dev-routes include 와 동일 패턴).

root /var/www/reverse-proxy;
index index.html;

# 포털 안내 페이지 (정적). 소스는 별도 GitLab 레포(swp-iot-portal-frontend)이고
# .42 의 portal-frontend 계정이 build/serve 한다. 이 root(/var/www/reverse-proxy)는
# .42 에서 심볼릭으로 /home/portal-frontend/portal/dist 를 가리킨다.
location / {
    try_files $uri $uri/ =404;
}

# ── 루트 CA 온보딩 (http 로 제공 — 경고 없이 받아 설치하게) ──
# /setup       안내 페이지 + 원클릭 설치 스크립트(install-root.bat/.command). 레포 onboarding/ 에서 서빙.
# /rootCA.crt  루트 공개 인증서. 활성화 시 .42:/etc/nginx/ssl/rootCA.crt 배치(없으면 404 — 무해).
# 상세: reverse-proxy/docs/tls-setup.md · 사유: https-transition-rationale.md
location = /setup { return 301 /setup/; }
location /setup/ {
    alias /home/riaveda/reverse-proxy/nginx/onboarding/;
    index index.html;
}
location = /rootCA.crt {
    alias /etc/nginx/ssl/rootCA.crt;
    default_type application/x-x509-ca-cert;
    add_header Content-Disposition 'attachment; filename="rootCA.crt"';
}

# ── 서비스 라우팅 ──
# ── GitLab ──
location /gitlab {
    proxy_pass http://10.10.10.36:5050;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 파일 업로드 / git push 대비
    client_max_body_size 0;

    # git clone, 큰 응답 대비 타임아웃
    proxy_connect_timeout 300;
    proxy_send_timeout    300;
    proxy_read_timeout    300;
    proxy_buffering       off;
}
# ── Build-Center ──
location /build {
    proxy_pass http://10.10.10.41:4050;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket (SSH 터미널, 빌드 로그 스트림)
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    client_max_body_size 0;

    proxy_connect_timeout 300;
    proxy_send_timeout    300;
    proxy_read_timeout    300;
    proxy_buffering       off;
}
# ── Agent-Platform ──
location /agent {
    proxy_pass http://10.10.10.6:5000;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    client_max_body_size 0;

    proxy_connect_timeout 300;
    proxy_send_timeout    300;
    proxy_read_timeout    300;
    proxy_buffering       off;
}

# ── Agent-Platform 공유 dev 스택 (/agent-dev → :5001) ──
# 영구 tier(prod /agent 와 대칭) — 개인 스택(/agent-<id>, 아래 dynamic include)과 달리
# 여기 static 으로 둔다. dev 스택은 BASE_PATH=/agent-dev 로 프론트를 빌드하므로 경로가 1:1 로 맞는다.
# nginx longest-prefix 매칭이라 /agent(:5000)보다 /agent-dev 가 우선한다.
location /agent-dev {
    proxy_pass http://10.10.10.6:5001;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    client_max_body_size 0;

    proxy_connect_timeout 300;
    proxy_send_timeout    300;
    proxy_read_timeout    300;
    proxy_buffering       off;
}

# ── collab_search (.40:4100) ──
# base-path 방식: 앱이 /collab_search 를 base path 로 서빙(prefix 안 뗌).
# 그래서 proxy_pass 에 URI 를 붙이지 않는다(붙이면 prefix 가 잘려나감).
location /collab_search {
    proxy_pass http://10.10.10.40:4100;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    client_max_body_size 0;

    proxy_connect_timeout 300;
    proxy_send_timeout    300;
    proxy_read_timeout    300;
    proxy_buffering       off;
}

# ── 개발자별 개인 스택 (/agent-<id>) ──
# add_user 가 dev-routes/agent-<id>.conf 를 자동 생성(agent-platform scripts/provision/nginx-route.sh)
# → pnbctl proxy deploy 가 .42 로 rsync. 경로는 .42 파일시스템 기준 절대경로(nginx prefix 무관).
# glob 이라 파일이 0개여도 nginx 에러 없음(개발자 추가 전 안전).
include /home/riaveda/reverse-proxy/nginx/dev-routes/*.conf;

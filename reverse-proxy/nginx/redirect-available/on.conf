# 브라우저 https 유도(조건부 리다이렉트 + probe) 활성화 플래그.
#
# 활성화: 이 파일을 ../redirect-enabled/ 로 복사하면 reverse-proxy.conf 의 :80 server include 가 잡아
#         $ap_toggle=1 이 되고, 브라우저 nav 유도가 켜진다.
# 선행 조건: tls 인증서 배치 + tls-enabled 활성화(=:443 이 실제로 떠 있어야 probe 가 성공 판정 가능).
#           :443 없이 이걸 켜면 probe 가 항상 실패 → 브라우저가 늘 /setup/rootca 가이드로 감(오작동).
# 끄기: redirect-enabled/ 에서 이 파일을 지우면 즉시 무효(→ $ap_toggle=0, 정상 :80 서빙).
# 상세: reverse-proxy/docs/tls-setup.md · 사유: https-transition-rationale.md
set $ap_toggle 1;

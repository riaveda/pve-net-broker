map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP (:80) — 현재 서빙 경로 (동작 불변) ──
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name swp-iot.lge.com;

    include /home/riaveda/reverse-proxy/nginx/_service-routes.conf;
}

# ── HTTPS (:443, HTTP/2) — 【준비만·비활성】 ──
# tls-enabled/ 가 비어 있으면 HTTPS server 블록이 없어 현행 :80 그대로다(= 지금 상태).
# 인증서를 만들고(scripts/gen-certs.sh) .42 에 배치한 뒤, tls-available/<...>.conf 를
# tls-enabled/ 로 복사하면 그때 비로소 :443 이 켜진다. 그 전엔 완전 dormant(기존 서비스 무영향).
# (glob 이라 비어 있어도 nginx 에러 없음 — dev-routes 와 동일 안전 패턴.) 절차: docs/tls-setup.md
include /home/riaveda/reverse-proxy/nginx/tls-enabled/*.conf;

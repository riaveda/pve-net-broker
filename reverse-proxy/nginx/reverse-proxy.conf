map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP (:80) — 기존 경로 유지(무중단) ──
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name swp-iot.lge.com;

    include /home/riaveda/reverse-proxy/nginx/_service-routes.conf;
}

# ── HTTPS (:443, HTTP/2) — 사내 CA leaf 로 TLS 종단 ──
# 활성화는 tls-enabled/*.conf glob include 로 한다(아래). tls-enabled 가 비어 있으면
# HTTPS server 블록이 없어 현행 :80 동작 그대로 — 즉 인증서 배치 전엔 이 파일이 아무 것도 안 켠다.
# 켜는 법: reverse-proxy/nginx/tls-available/<host>.conf 를 tls-enabled/ 로 복사 + 인증서 배치.
#          (glob 이라 비어 있어도 nginx 에러 없음 — dev-routes 와 동일 안전 패턴.)
# 상세 절차: reverse-proxy/docs/tls-setup.md
include /home/riaveda/reverse-proxy/nginx/tls-enabled/*.conf;

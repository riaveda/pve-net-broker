map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─────────────────────────────────────────────────────────────────────────────
# 브라우저 https 유도 (조건부 리다이렉트 / probe) 판별 맵
#   목적: :80 브라우저 접속을 — 루트 신뢰 PC → https(:443) 리다이렉트, 미신뢰 → 설치 가이드로.
#   기계 클라이언트(git·MCP·BYOH)는 여기서 자동 제외 → http 그대로 통과(안 깨짐).
#   ★ 활성화 전엔 완전 무효: redirect-enabled/ 가 비어 있으면 $ap_toggle=0 → 항상 "proxy".
#   상세·사유: reverse-proxy/docs/https-transition-rationale.md §4·§7
# ─────────────────────────────────────────────────────────────────────────────

# (1) 브라우저 top-level navigation 인가 — 기계 클라이언트/서브리소스는 0.
map $http_accept $ap_nav_accept {          # Sec-Fetch 없는 구형 브라우저 fallback (먼저 정의)
    "~*text/html"  1;
    default        0;
}
map $http_sec_fetch_mode $ap_nav {
    "navigate"  1;
    default     $ap_nav_accept;
}

# (2) 루트 신뢰 상태 쿠키 — 1=신뢰(→https), skip=설치 안 함 선택(→http 그대로), 그 외=미확인.
map $cookie_ap_tls $ap_tls_state {
    "1"      "trust";
    "skip"   "skip";
    default  "unknown";
}

# (3) 리다이렉트 대상 경로만 — 포털(/) · /agent* (agent·agent-dev·개인스택 agent-<id> 전부) · /build*.
#     gitlab·collab_search·/setup·probe 는 안 걸림(제외). 비-브라우저(curl /agent/sdk 등)는 (1) 에서 걸러짐.
map $uri $ap_redirect_path {
    "~^/agent"  1;
    "~^/build"  1;
    "~^/$"      1;
    default     0;
}

# (4) 종합 디스패치: toggle:신뢰상태:nav:대상 → 행동.
map "$ap_toggle:$ap_tls_state:$ap_nav:$ap_redirect_path" $ap_dispatch {
    "~^1:trust:[01]:1$"    "https";      # 신뢰 PC → https 리다이렉트
    "~^1:unknown:1:1$"     "bootstrap";  # 미확인 + 브라우저 nav → probe 부트스트랩
    default                "proxy";      # 그 외(기계·skip·비대상·비활성) → 정상 서빙
}

# ── HTTP (:80) — 현재 서빙 경로 ──
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name swp-iot.lge.com;

    # https 유도 토글: 기본 off. 활성화 시 redirect-enabled/on.conf(=`set $ap_toggle 1;`)가 켠다.
    # (tls 인증서 배치 + tls-enabled 활성화가 선행돼야 probe 대상 :443 이 존재 — docs/tls-setup.md.)
    set $ap_toggle 0;
    include /home/riaveda/reverse-proxy/nginx/redirect-enabled/*.conf;

    # 브라우저만 https 유도 — 기계 클라이언트·비대상 경로는 $ap_dispatch="proxy" 라 아래 if 에 안 걸림.
    if ($ap_dispatch = "https")     { return 301 https://$host$request_uri; }
    if ($ap_dispatch = "bootstrap") { rewrite ^ /__ap_bootstrap last; }

    include /home/riaveda/reverse-proxy/nginx/_service-routes.conf;
}

# ── HTTPS (:443, HTTP/2) — 【준비만·비활성】 ──
# tls-enabled/ 가 비어 있으면 HTTPS server 블록이 없어 현행 :80 그대로다(= 지금 상태).
# 인증서를 만들고(scripts/gen-certs.sh) .42 에 배치한 뒤, tls-available/<...>.conf 를
# tls-enabled/ 로 복사하면 그때 비로소 :443 이 켜진다. 그 전엔 완전 dormant(기존 서비스 무영향).
# (glob 이라 비어 있어도 nginx 에러 없음 — dev-routes 와 동일 안전 패턴.) 절차: docs/tls-setup.md
include /home/riaveda/reverse-proxy/nginx/tls-enabled/*.conf;

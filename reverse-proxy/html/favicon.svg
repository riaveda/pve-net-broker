<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="hubg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2684FF"/>
      <stop offset="1" stop-color="#0052CC"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#hubg)"/>
  <!-- hub → device 연결선 -->
  <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <line x1="32" y1="32" x2="16" y2="16"/>
    <line x1="32" y1="32" x2="48" y2="16"/>
    <line x1="32" y1="32" x2="16" y2="48"/>
    <line x1="32" y1="32" x2="48" y2="48"/>
  </g>
  <!-- device 노드 -->
  <g fill="#ffffff">
    <circle cx="16" cy="16" r="5"/>
    <circle cx="48" cy="16" r="5"/>
    <circle cx="16" cy="48" r="5"/>
    <circle cx="48" cy="48" r="5"/>
  </g>
  <!-- 중앙 hub -->
  <circle cx="32" cy="32" r="9.5" fill="#ffffff"/>
  <circle cx="32" cy="32" r="4.5" fill="#0052CC"/>
</svg>

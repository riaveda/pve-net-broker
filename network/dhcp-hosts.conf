# PVE Net Broker — DHCP fixed-IP host reservations
# Managed by: git repo /opt/pve-net-broker (included by dhcpd.conf)
#
# 이 파일이 VM별 고정 IP를 관리하는 유일한 곳입니다.
# 새 VM 추가:
#   1) 아래에 host 블록 추가 (name / hardware ethernet=MAC / fixed-address=IP)
#   2) git commit && push
#   3) PVE 호스트: cd /opt/pve-net-broker && git pull && pnbctl dhcp reload

# referenceplatform 은 35번 고정
host reference-platform {
  hardware ethernet BC:24:11:79:B0:A2;
  fixed-address 10.10.10.35;
  option domain-name-servers 10.231.3.11;
  option routers 10.10.10.1;
  option subnet-mask 255.255.255.0;
  option broadcast-address 10.10.10.255;
}
